<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Hashtag AI</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet"><style>body{font-family:'Inter',sans-serif;margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background-color:#f0f2f5;color:#333}header{margin-bottom:20px;text-align:center}h1{color:#1a202c}main{background-color:#fff;padding:40px;border-radius:12px;box-shadow:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);width:90%;max-width:500px;text-align:center}p.tagline{color:#6b7280;font-size:1.1rem;margin-bottom:30px}form{display:flex;flex-direction:column;gap:20px}input[type="text"]{padding:12px 16px;border:1px solid #d1d5db;border-radius:8px;font-size:1rem;width:calc(100% - 34px)}button{background-color:#4f46e5;color:#fff;padding:12px 20px;border:none;border-radius:8px;font-size:1rem;cursor:pointer;transition:background-color .3s ease}button:hover{background-color:#4338ca}#hashtags{margin-top:30px;background-color:#f9fafb;border-radius:8px;padding:20px;min-height:80px;text-align:left;white-space:pre-wrap;word-wrap:break-word;border:1px dashed #e0e7ff;color:#333}</style></head><body><header><h1>Hashtag AI</h1><p class="tagline">Generate trending Instagram hashtags instantly.</p></header><main><form id="hashtag-form"><input type="text" id="prompt" placeholder="Enter your post idea (e.g., 'new coffee launch', 'summer fashion tips')" required><button type="submit">Generate Hashtags</button></form><div id="hashtags"></div></main><script>document.getElementById('hashtag-form').addEventListener('submit',async(e)=>{e.preventDefault();const prompt=document.getElementById('prompt').value;const hashtagsDiv=document.getElementById('hashtags');hashtagsDiv.textContent='Generating...';try{const response=await fetch('/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});const data=await response.json();if(response.ok){hashtagsDiv.textContent=data.hashtags}else{hashtagsDiv.textContent='Error: '+data.error}}catch(error){hashtagsDiv.textContent='Network error, please try again.'}});</script></body></html>
